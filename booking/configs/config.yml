server:
  port: 8080
  host: 0.0.0.0
  read_timeout: 5s
  write_timeout: 5s
  idle_timeout: 60s
  shutdown_timeout: 30s

postgres:
  max_conns: 25
  max_lifetime: 1h

kafka:
  conn_type: tcp
  host: kafka
  port: 9092
  topics:
    - bookings.created
    - bookings.cancelled
  partitions: 1
  replications: 1
  timeout: 5s

logger:
  level: debug
  format: text

ticker:
  slot_interval: 1h
  tick_interval: 1h

jwt_token:
  access:
    exp: 1h
    iss: booking-api
  refresh:
    iss: booking-api
    exp: 168h

  